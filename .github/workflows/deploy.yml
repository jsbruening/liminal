name: Deploy

# Only fires on push to master — and master's branch protection requires at
# least one approving review and blocks direct pushes (enforced even for
# admins), so in practice this only ever runs after a PR has been reviewed,
# approved, and merged.
on:
  push:
    branches: [master]

jobs:
  # Builds the arm64 image on GitHub's own runner (via QEMU emulation) and
  # pushes it to GHCR. Building natively on the Pi instead — npm ci + next
  # build — was heavy enough to starve its I/O and wedge the Docker daemon
  # mid-build (observed twice). The Pi now only ever pulls a finished image.
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/jsbruening/liminal:latest
            ghcr.io/jsbruening/liminal:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Runs on the self-hosted runner living on the Pi itself, so no SSH
  # credentials to the Pi ever need to exist in GitHub Secrets — the runner
  # already IS the deploy target. Only pulls the already-built image; never
  # runs npm/next on the Pi.
  deploy:
    needs: build
    runs-on: [self-hosted, self-hosted-pi]
    steps:
      - name: Pull latest config and image
        run: |
          set -e
          cd ~/liminal
          git fetch origin master
          git reset --hard origin/master
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker compose --env-file .env.production pull app
          docker compose --env-file .env.production up -d app

      - name: Prune old images
        # The Pi's SD card has filled up before — clean up after every
        # deploy rather than letting old image layers accumulate.
        run: docker image prune -f

      - name: Health check
        run: |
          sleep 5
          curl -sf http://localhost:3000/ -o /dev/null
