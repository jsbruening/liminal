services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: liminal
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/liminal
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_TRUST_HOST: "true"
      AUTH_DISCORD_ID: ${AUTH_DISCORD_ID:-}
      AUTH_DISCORD_SECRET: ${AUTH_DISCORD_SECRET:-}
      NODE_ENV: production
    # Bound to localhost only — the Pi already runs a host-level Caddy
    # instance fronting other self-hosted services on 80/443. That Caddy's
    # Caddyfile (system config, not in this repo) reverse-proxies our domain
    # to localhost:3000 instead of us running a second Caddy in Docker.
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - uploads:/app/public/uploads

volumes:
  postgres_data:
  uploads:
